program: src/train.py
method: bayes
metric:
  name: val_accuracy
  goal: maximize
parameters:
  dataset:
    value: "mnist"
  epochs:
    value: 10
  batch_size:
    values: [32, 64, 128]
  learning_rate:
    values: [0.0005, 0.001, 0.005, 0.01, 0.05, 0.1]
  optimizer:
    values: ["sgd", "momentum", "nag", "rmsprop", "adam", "nadam"]
  activation:
    values: ["sigmoid", "tanh", "relu"]
  weight_init:
    values: ["random", "xavier"]
  num_layers:
    values: [1, 2, 3]
  hidden_size:
    values: [32, 64, 128]